<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <!-- Cache busting ?v=2 added to force browser to refresh the icon -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/3Y7f0fM/bombon-logo.png?v=2">
    <link rel="shortcut icon" type="image/png" href="https://i.ibb.co/3Y7f0fM/bombon-logo.png?v=2">
    <link rel="apple-touch-icon" href="https://i.ibb.co/3Y7f0fM/bombon-logo.png?v=2">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ec4899">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bombon - Tienda de Ropa</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom Tailwind Config -->
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: 'var(--primary, #ec4899)',      // Hot Pink (pink-500)
                    'primary-light': 'var(--primary-light, #f472b6)', // Lighter Pink (pink-400)
                    'primary-dark': 'var(--primary-dark, #db2777)',   // Darker Pink (pink-600)
                    background: 'var(--background, #ffffff)',    // White
                    surface: 'var(--surface, #f9fafb)',       // Off-White (gray-50) for cards/modals
                    'on-surface': 'var(--on-surface, #1f2937)',  // Dark Gray text
                },
                fontFamily: {
                    sans: ['Poppins', 'sans-serif'],
                    serif: ['Playfair Display', 'serif'],
                }
            }
        }
    }
    </script>
    <style>
      :root {
        --primary: #ec4899;
        --primary-light: #f472b6;
        --primary-dark: #db2777;
        --background: #ffffff;
        --surface: #f9fafb;
        --on-surface: #1f2937;
      }
      
      /* Cyberpunk theme variables */
      [data-theme='men'] {
        --primary: #ec4899; /* Fuchsia */
        --primary-light: #f472b6;
        --primary-dark: #db2777;
        --background: #000000;
        --surface: #0d0d0d;
        --on-surface: #ffffff;
        --primary-gradient: linear-gradient(to right, #3b82f6, #ec4899);
      }

      /* Cyberpunk theme specific styles */
      [data-theme='men'] .cyber-border {
        border: 1px solid var(--primary);
        box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
      }
      
      [data-theme='men'] .cyber-text {
        text-shadow: 0 0 5px var(--primary);
      }

      [data-theme='men'] .cyber-gradient-bg {
        background: var(--primary-gradient) !important;
      }
      
      [data-theme='men'] .cyber-gradient-text {
        background: var(--primary-gradient) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .scrollbar-hide {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react/": "https://esm.sh/react@^19.1.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.9.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
    "vite": "https://esm.sh/vite@^7.0.4",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^4.6.0",
    "firebase/": "https://aistudiocdn.com/firebase@^12.5.0/"
  }
}
</script>
</head>
<body class="bg-background font-sans text-on-surface">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
